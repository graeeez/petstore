spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # CORS Configuration for frontend
  mvc:
    cors:
      path-pattern: "/pastoral/**"
      allowed-origins: "https://petstore-frontend-wl08.onrender.com"
      allowed-methods: "*"
      allowed-headers: "*"
      max-age: 3600

server:
  port: ${PORT:8080}
  servlet:
    context-path: /pastoral

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.pastoral.petstore: INFO
