services:
  - type: web
    name: petstore-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: JAVA_OPTS
        value: "-Xmx384m -Xms256m"
      - key: NODE_ENV
        value: production
      # Link to the database to get connection details


      - key: DB_HOST
        fromDatabase:
          name: petstore_prod
          property: host
      - key: DB_PORT
        fromDatabase:
          name: petstore_prod
          property: port
      - key: DB_USER
        fromDatabase:
          name: petstore_prod
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: petstore_prod
          property: password
      - key: DB_NAME
        fromDatabase:
          name: petstore_prod
          property: database

  - type: web
    name: petstore-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: /pastoral
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /pastoral/*
        destination: https://petstore-backend.onrender.com/pastoral/*

databases:
  - name: petstore_prod
    plan: free

