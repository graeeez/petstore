services:
  # Backend Web Service (Counts as your 1 free web service)
  - type: web
    name: petstore-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: JAVA_OPTS
        value: "-Xmx384m -Xms256m"
      - key: NODE_ENV
        value: production
      # Database connection details linked from the petstore_prod database
      - key: DB_HOST
        fromDatabase:
          name: petstore_prod
          property: host
      - key: DB_PORT
        fromDatabase:
          name: petstore_prod
          property: port
      - key: DB_USER
        fromDatabase:
          name: petstore_prod
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: petstore_prod
          property: password
      - key: DB_NAME
        fromDatabase:
          name: petstore_prod
          property: database

  # Frontend Static Site (Always free, does not count against web service limit)
  - type: web
    name: petstore-frontend
    runtime: static
    buildCommand: npm install && npm run build
    # Set the base directory for the frontend build
    rootDirectory: frontend
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: /pastoral
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /pastoral/*
        # Use the internal service name if possible, or keep external for simplicity
        destination: https://petstore-backend.onrender.com/pastoral/*

databases:
  - name: petstore_prod
    plan: free
